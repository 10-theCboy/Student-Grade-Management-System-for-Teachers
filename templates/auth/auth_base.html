<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GradeMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html, body { height: 100%; }
        body {
            background: #f0f2f5;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 5vh 0;
            position: relative;
            overflow-y: auto;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("/static/img/ej-banner.jpg") center/cover no-repeat;
            opacity: 0.2;
            filter: blur(4px);
            z-index: 0;
        }
        body > * { position: relative; z-index: 1; }
        @keyframes borderIn {
            0% { opacity: 0; max-height: 0; padding: 0 1rem; transform: scale(0.96) translateY(-6px); }
            25% { opacity: 1; max-height: 120px; padding: 1rem; transform: scale(1) translateY(0); border-color: #0b3daa; box-shadow: 0 0 0 4px rgba(11,61,170,0.12); }
            50% { max-height: 120px; border-color: #0b3daa; box-shadow: 0 0 0 4px rgba(11,61,170,0.12); }
            100% { opacity: 1; max-height: 900px; padding: 1rem; transform: scale(1) translateY(0); border-color: rgba(0,0,0,0.125); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        }
        @keyframes contentFadeIn {
            0% { opacity: 0; transform: translateY(6px); }
            45% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .auth-card { animation: borderIn .8s cubic-bezier(.22,1,.36,1) forwards; overflow: hidden; }
        .auth-card .card-body { animation: contentFadeIn .85s cubic-bezier(.22,1,.36,1) forwards; }
        @keyframes borderOut {
            0% { opacity: 1; max-height: 900px; padding: 1rem; transform: scale(1) translateY(0); }
            15% { opacity: 1; max-height: 900px; padding: 1rem; transform: scale(1) translateY(0); border-color: #0b3daa; box-shadow: 0 0 0 4px rgba(11,61,170,0.12); }
            35% { opacity: 0; max-height: 120px; padding: 1rem; transform: scale(0.98) translateY(0); border-color: #0b3daa; box-shadow: 0 0 0 4px rgba(11,61,170,0.12); }
            65% { opacity: 0; max-height: 120px; padding: 1rem; transform: scale(0.98) translateY(0); border-color: #0b3daa; box-shadow: 0 0 0 4px rgba(11,61,170,0.12); }
            100% { opacity: 0; max-height: 0; padding: 0 1rem; transform: scale(0.95) translateY(-8px); border-color: #0b3daa; }
        }
        @keyframes bodyFadeOut {
            0% { opacity: 1; }
            20% { opacity: 0; }
            100% { opacity: 0; }
        }
        .auth-exit { animation: borderOut .9s cubic-bezier(.4,0,.2,1) forwards; overflow: hidden; pointer-events: none; }
        .auth-exit .card-body { animation: bodyFadeOut .25s ease-out forwards; }
    </style>
</head>
<body>
    <div style="width:100%;max-width:520px;padding:1rem;position:relative">
        <div class="text-end mb-2" style="position:absolute;right:1rem;top:1rem;z-index:2">
            <div class="dropdown d-inline-block">
                <a href="#" class="lang-btn-auth" data-bs-toggle="dropdown" aria-expanded="false" title="{{ _('language') }}">
                    <i class="bi bi-globe2"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item lang-dropdown-item{% if current_lang == 'en' %} active{% endif %}" href="{{ url_for('auth.set_language', lang='en') }}">EN</a></li>
                    <li><a class="dropdown-item lang-dropdown-item{% if current_lang == 'zh' %} active{% endif %}" href="{{ url_for('auth.set_language', lang='zh') }}">中文</a></li>
                </ul>
            </div>
        </div>
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="GradeMS" height="48">
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show py-2">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        {% endfor %}
        {% endwith %}
        {% block page_content %}{% endblock %}
        <p class="text-center text-muted small mt-4 mb-0">&copy; 2026 GradeMS</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        var card = document.querySelector('.auth-card');
        document.querySelectorAll('a[href*="/login"], a[href*="/register"]').forEach(function (link) {
            link.addEventListener('click', function (e) {
                if (!card) return;
                e.preventDefault();
                var href = this.getAttribute('href');
                card.classList.add('auth-exit');
                setTimeout(function () { window.location.href = href; }, 850);
            });
        });
    });
    </script>
</body>
</html>
